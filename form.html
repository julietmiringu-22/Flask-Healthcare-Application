<!DOCTYPE html>
<html>
<head>
    <title>Income & Expense Survey</title>
</head>
<body>

<h2>Survey Form</h2>

<form action="/submit" method="post">

    Age:
    <input type="number" name="age" required><br><br>

    Gender:
    <select name="gender">
        <option>Male</option>
        <option>Female</option>
    </select><br><br>

    Total Income:
    <input type="number" name="income" required><br><br>

    <h3>Expenses</h3>

    Utilities: <input type="number" name="utilities"><br>
    Entertainment: <input type="number" name="entertainment"><br>
    School Fees: <input type="number" name="school_fees"><br>
    Shopping: <input type="number" name="shopping"><br>
    Healthcare: <input type="number" name="healthcare"><br><br>

    <button type="submit">Submit</button>
